services:
  redis:
    image: redis:7-alpine
    container_name: mydash-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8127:3000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://mydash-redis:6379
    volumes:
      - sqlite-data:/app/prisma

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://mydash-redis:6379
    volumes:
      - sqlite-data:/app/prisma
    restart: unless-stopped

volumes:
  redis-data:
  sqlite-data:
